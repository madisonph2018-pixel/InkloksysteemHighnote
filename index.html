<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highnotes Inklok Systeem</title>

<style>
body{
font-family:Arial;
background:#f3f4f6;
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:600px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{text-align:center;}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#111827;
color:white;
cursor:pointer;
}

button:hover{
background:#374151;
}

.log{
border:1px solid #ddd;
padding:10px;
border-radius:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
}

.status{
margin-top:15px;
font-weight:bold;
text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h1>Highnotes Inklok Systeem</h1>

<input id="nameInput" placeholder="Naam">
<button onclick="addName()">Naam opslaan</button>

<select id="nameSelect" onchange="loadData()">
<option value="">Selecteer naam</option>
</select>

<button onclick="startWork()">Start</button>
<button onclick="stopWork()">Stop</button>

<div class="status" id="statusText">Status: Uitgeklokt</div>
<div class="status" id="totalText">Totaal: 0 uur</div>

<div id="logs"></div>

</div>

<script>

const WEBHOOK = "PLAK_HIER_JE_DISCORD_WEBHOOK";

let currentName="";
let logs=[];
let status="Uitgeklokt";

function sendWebhook(message){

fetch(WEBHOOK,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:message
})
});

}

function addName(){

const name=document.getElementById("nameInput").value.trim();

if(!name)return;

let names=JSON.parse(localStorage.getItem("names")||"[]");

if(!names.includes(name)){
names.push(name);
localStorage.setItem("names",JSON.stringify(names));
}

document.getElementById("nameInput").value="";
loadNames();

}

function loadNames(){

const select=document.getElementById("nameSelect");
const names=JSON.parse(localStorage.getItem("names")||"[]");

select.innerHTML='<option value="">Selecteer naam</option>';

names.forEach(n=>{
let o=document.createElement("option");
o.value=n;
o.textContent=n;
select.appendChild(o);
});

}

function loadData(){

currentName=document.getElementById("nameSelect").value;

logs=JSON.parse(localStorage.getItem("logs_"+currentName)||"[]");
status=localStorage.getItem("status_"+currentName)||"Uitgeklokt";

updateUI();

}

function save(){

localStorage.setItem("logs_"+currentName,JSON.stringify(logs));
localStorage.setItem("status_"+currentName,status);

}

function startWork(){

if(!currentName)return;
if(status==="Ingeklokt")return;

status="Ingeklokt";

const now=new Date();

logs.push({
start:now.toISOString(),
end:null
});

save();
updateUI();

}

function stopWork(){

if(!currentName)return;
if(status==="Uitgeklokt")return;

status="Uitgeklokt";

const now=new Date();
const last=logs[logs.length-1];

last.end=now.toISOString();

const start=new Date(last.start);
const end=new Date(last.end);

const hours=((end-start)/(1000*60*60)).toFixed(2);

sendWebhook(
`📋 Werk Log

👤 Naam: ${currentName}
🟢 Start: ${start.toLocaleString()}
🔴 Stop: ${end.toLocaleString()}
⏱️ Uren: ${hours}`
);

save();
updateUI();

}

function calcHours(start,end){

if(!end)return "-";

return ((new Date(end)-new Date(start))/(1000*60*60)).toFixed(2)+" uur";

}

function total(){

let t=0;

logs.forEach(l=>{
if(l.end){
t+=(new Date(l.end)-new Date(l.start))/(1000*60*60);
}
});

return t.toFixed(2);

}

function updateUI(){

document.getElementById("statusText").innerText="Status: "+status;
document.getElementById("totalText").innerText="Totaal: "+total()+" uur";

const div=document.getElementById("logs");
div.innerHTML="";

logs.forEach(l=>{

const row=document.createElement("div");
row.className="log";

row.innerHTML=`
<div>
Start: ${new Date(l.start).toLocaleString()}<br>
Stop: ${l.end ? new Date(l.end).toLocaleString() : "-"}
</div>
<div>${calcHours(l.start,l.end)}</div>
`;

div.appendChild(row);

});

}

loadNames();

</script>

</body>
</html>
